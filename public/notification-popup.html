<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notificación</title>
    <style>
      :root {
        color-scheme: light;
      }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .popup {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        color: #e2e8f0;
        padding: 12px 14px;
        display: flex;
        gap: 12px;
        align-items: flex-start;
        box-shadow: 0 18px 45px rgba(2, 6, 23, 0.55);
      }
      .icon {
        width: 10px;
        height: 10px;
        margin-top: 6px;
        border-radius: 999px;
        flex-shrink: 0;
      }
      .icon.info { background: #38bdf8; }
      .icon.success { background: #22c55e; }
      .icon.warning { background: #f59e0b; }
      .icon.error { background: #ef4444; }
      .content {
        min-width: 0;
        flex: 1;
      }
      .title {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        color: #f8fafc;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .body {
        margin: 4px 0 0;
        font-size: 12.5px;
        line-height: 1.35;
        color: #cbd5e1;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="popup">
      <span id="icon" class="icon info"></span>
      <div class="content">
        <p id="title" class="title">Notificación</p>
        <p id="body" class="body">Mensaje</p>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const title = params.get('title') || 'Notificación';
      const body = params.get('body') || '';
      const type = params.get('type') || 'info';

      const titleEl = document.getElementById('title');
      const bodyEl = document.getElementById('body');
      const iconEl = document.getElementById('icon');

      titleEl.textContent = title;
      bodyEl.textContent = body;
      iconEl.className = `icon ${['success', 'error', 'warning', 'info'].includes(type) ? type : 'info'}`;
    </script>
  </body>
</html>
